<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="resources/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
     <title>Contact Page</title>
</head>
<body>
    <main id="container">
        <header>
            <h1>Interested in our business pricing?</h1>
            <p>Fill out the form to view details and we'll contact you as sonn as possible</p>
        </header>
        <section class="form-card">
            <form action="#" class="formulario">
            <div class="form-input-text">
                <div class="input-text">
                    <label for="name">Name </label>
                    <input type="text" name="firstname" id="firstname">
                </div>
                <div class="input-text">
                    <label for="email">Company Email </label>
                    <input type="text" name="email" id="email">
                    
                </div>
                <div class="input-text">
                    <label for="company">Company size </label>
                    <select name="company" id="company">
                        <option value="Employees">50-100 Employees</option>
                        <option value="Employees2">100-150 Employees</option>
                    </select>
                    
                </div>
                <div class="input-text">
                    <label for="subject">Subject </label>
                    <select name="subject" id="subject">
                        <option value="Landing-pages">Building Landing pages</option>
                        <option value="Software">Software Development</option>
                    </select>
                    
                </div>
                <div class="input-text">
                    <label for="Message">Message </label>
                    <textarea id="Message" rows="5"></textarea>
                    
                </div>
                <button type="submit" class="btn-submit">Contact Sales</button>
            </div>
        </form>
        </section>
    </main>
    
</body>
</html>
